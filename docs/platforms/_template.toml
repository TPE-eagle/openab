# ═══ Schema 3 — platform-quirks (freeform, dated findings log) ═══════════════
# One [[quirks]] block per gotcha / special model / structural constraint.
# `note` is prose and is NOT machine-checked. `source` and `refs` are optional;
# when present, conformance shell-checks them (URL/file:line exists, PR exists).

[[quirks]]
date   = ""                        # required, "YYYY-MM-DD" — when documented
title  = ""                        # required. short headline
note   = ""                        # required. freeform prose (may be multi-paragraph)
# required, enum: intrinsic (a platform fact) | openab_decision (a choice/finding of ours)
kind   = "intrinsic"
source = ""                        # optional. official-doc URL, or "file.rs" / "file.rs#symbol"
refs   = []                        # optional. ["#1291", ...] PR/ADR links
