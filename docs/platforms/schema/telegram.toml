title  = "Findings-log: deleteMessage 48h window"
note   = "`deleteMessage` generally only works within 48h for a bot's outgoing messages; deleting others' needs admin `can_delete_messages`."
kind   = "intrinsic"
source = "https://core.telegram.org/bots/api#deletemessage"

[[quirks]]
date   = "2026-07-04"
